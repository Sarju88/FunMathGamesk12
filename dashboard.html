<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayX Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #020402;
      color: #39ff14;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      width: min(92vw, 700px);
      background: #0a120a;
      border: 1px solid #39ff14;
      box-shadow: 0 0 25px rgba(57,255,20,.35);
      padding: 32px;
    }

    h1 {
      margin-top: 0;
    }

    button {
      padding: 12px 16px;
      background: #39ff14;
      border: none;
      color: #000;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>PlayX Gaming Hub Dashboard</h1>
    <p>Welcome to the dashboard.</p>
    <button onclick="logout()">LOG OUT</button>
  </div>

  <script>
    function getCookie(name) {
      const parts = document.cookie.split("; ");
      for (const part of parts) {
        const [key, value] = part.split("=");
        if (key === name) {
          return decodeURIComponent(value || "");
        }
      }
      return null;
    }

    function logout() {
      document.cookie = "playx_auth=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";
      window.location.replace("index.html?password=iwantgames");
    }

    if (getCookie("playx_auth") !== "true") {
      window.location.replace("index.html?password=iwantgames");
    }
  </script>
</body>
</html>
